<!DOCTYPE html>
<html>
<head>
<title>4K Game Engine</title>

<meta name="viewport"
content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

canvas {
  display: block;
  margin: auto;
  border: 3px solid white;
  width: 100vw;
  height: 85vh;
}
</style>
</head>

<body>

<h2>4K Resolution Game</h2>

<canvas id="gameCanvas"></canvas>

<div>
<button onclick="move('up')">⬆️</button><br>
<button onclick="move('left')">⬅️</button>
<button onclick="move('down')">⬇️</button>
<button onclick="move('right')">➡️</button>
</div>

<script>

const canvas =
  document.getElementById("gameCanvas");

const ctx =
  canvas.getContext("2d");

const BASE_WIDTH = 3840;
const BASE_HEIGHT = 2160;

function setupCanvas() {

  const ratio =
    window.devicePixelRatio || 1;

  canvas.width =
    BASE_WIDTH * ratio;

  canvas.height =
    BASE_HEIGHT * ratio;

  ctx.setTransform(
    ratio,
    0,
    0,
    ratio,
    0,
    0
  );

}

setupCanvas();

let camera = {
  x: 0,
  y: 0
};

let worldSize = 8000;

let player = {
  x: 400,
  y: 400,
  size: 80,
  speed: 20
};

function drawWorld() {

  ctx.fillStyle = "#2e8b57";

  ctx.fillRect(
    0,
    0,
    worldSize,
    worldSize
  );

  ctx.strokeStyle = "#ffffff";

  for (
    let x = 0;
    x < worldSize;
    x += 200
  ) {

    ctx.beginPath();

    ctx.moveTo(x, 0);

    ctx.lineTo(x, worldSize);

    ctx.stroke();

  }

  for (
    let y = 0;
    y < worldSize;
    y += 200
  ) {

    ctx.beginPath();

    ctx.moveTo(0, y);

    ctx.lineTo(worldSize, y);

    ctx.stroke();

  }

}

function drawPlayer() {

  ctx.fillStyle = "blue";

  ctx.fillRect(
    player.x - camera.x,
    player.y - camera.y,
    player.size,
    player.size
  );

}

function move(direction) {

  if (direction === "up")
    player.y -= player.speed;

  if (direction === "down")
    player.y += player.speed;

  if (direction === "left")
    player.x -= player.speed;

  if (direction === "right")
    player.x += player.speed;

  updateCamera();

}

function updateCamera() {

  camera.x =
    player.x -
    BASE_WIDTH / 2;

  camera.y =
    player.y -
    BASE_HEIGHT / 2;

}

function gameLoop() {

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.save();

  ctx.translate(
    -camera.x,
    -camera.y
  );

  drawWorld();

  drawPlayer();

  ctx.restore();

  requestAnimationFrame(
    gameLoop
  );

}

gameLoop();

</script>

</body>
</html>
