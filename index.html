<!DOCTYPE html>
<html>
<head>
<title>My Monster Catch Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  background: #222;
  color: white;
  text-align: center;
  font-family: Arial;
}

canvas {
  background: #6ecb63;
  display: block;
  margin: auto;
}

#controls {
  margin-top: 10px;
}

button {
  padding: 12px 18px;
  font-size: 18px;
  margin: 4px;
}
</style>
</head>

<body>

<h1>My Monster Catch Game</h1>

<canvas id="gameCanvas" width="400" height="500"></canvas>

<div id="controls">
<button onclick="move('up')">⬆️</button><br>
<button onclick="move('left')">⬅️</button>
<button onclick="move('down')">⬇️</button>
<button onclick="move('right')">➡️</button>
</div>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player = {
  x: 180,
  y: 230,
  size: 20
};

let monster = {
  x: Math.random() * 360,
  y: Math.random() * 460,
  size: 20,
  alive: true
};

let monstersCaught = 0;

function drawPlayer() {
  ctx.fillStyle = "blue";
  ctx.fillRect(
    player.x,
    player.y,
    player.size,
    player.size
  );
}

function drawMonster() {

  if (!monster.alive) return;

  ctx.fillStyle = "red";

  ctx.fillRect(
    monster.x,
    monster.y,
    monster.size,
    monster.size
  );

}

function drawUI() {

  ctx.fillStyle = "white";
  ctx.font = "18px Arial";

  ctx.fillText(
    "Caught: " + monstersCaught,
    10,
    25
  );

}

function checkCatch() {

  let dx =
    player.x - monster.x;

  let dy =
    player.y - monster.y;

  let distance =
    Math.sqrt(dx * dx + dy * dy);

  if (distance < 25) {

    monster.alive = false;

    monstersCaught++;

    setTimeout(() => {

      monster.x =
        Math.random() * 360;

      monster.y =
        Math.random() * 460;

      monster.alive = true;

    }, 1000);

  }

}

function move(direction) {

  if (direction === "up")
    player.y -= 20;

  if (direction === "down")
    player.y += 20;

  if (direction === "left")
    player.x -= 20;

  if (direction === "right")
    player.x += 20;

  checkCatch();

}

function gameLoop() {

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  drawPlayer();

  drawMonster();

  drawUI();

  requestAnimationFrame(
    gameLoop
  );

}

gameLoop();

</script>

</body>
</html>
