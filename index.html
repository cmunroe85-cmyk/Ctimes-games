<!DOCTYPE html>
<html>
<head>
    <title>Simple Pong</title>
    <style>
        canvas { background: #000; display: block; margin: 20px auto; border: 2px solid #fff; }
    </style>
</head>
<body>
    <canvas id="pong" width="600" height="400"></canvas>
    <script>
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");

        // Game objects
        const ball = { x: 300, y: 200, dx: 4, dy: 4, radius: 10 };
        const paddleHeight = 80, paddleWidth = 10;
        const player = { x: 0, y: 160 };
        const ai = { x: 590, y: 160 };

        // Draw functions
        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        }

        function drawCircle(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
        }

        // Mouse control for Player
        canvas.addEventListener("mousemove", e => {
            let rect = canvas.getBoundingClientRect();
            player.y = e.clientY - rect.top - paddleHeight / 2;
        });

        function update() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Simple AI logic: follows the ball
            ai.y += (ball.y - (ai.y + paddleHeight / 2)) * 0.1;

            // Wall collisions (top and bottom)
            if (ball.y < 0 || ball.y > canvas.height) ball.dy *= -1;

            // Paddle collisions
            let paddle = (ball.x < canvas.width / 2) ? player : ai;
            if (ball.x < paddle.x + paddleWidth && ball.x > paddle.x && 
                ball.y > paddle.y && ball.y < paddle.y + paddleHeight) {
                ball.dx *= -1.1; // Speed up slightly after each hit
            }

            // Score/Reset if ball goes out of bounds
            if (ball.x < 0 || ball.x > canvas.width) {
                ball.x = 300; ball.y = 200; ball.dx = 4;
            }
        }

        function game() {
            update();
            drawRect(0, 0, 600, 400, "#000"); // Clear background
            drawRect(player.x, player.y, paddleWidth, paddleHeight, "#fff"); // Player
            drawRect(ai.x, ai.y, paddleWidth, paddleHeight, "#fff"); // AI
            drawCircle(ball.x, ball.y, ball.radius, "#fff"); // Ball
            requestAnimationFrame(game);
        }
        game();
    </script>
</body>
</html>
