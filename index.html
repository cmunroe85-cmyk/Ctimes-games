<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokéQuest GB - Classic Style</title>
    <style>
        body { margin:0; padding:0; background:#111; overflow:hidden; font-family:'Courier New', monospace; color:#fff; }
        #game { width:100vw; height:100vh; position:relative; background:#000; }
        canvas { image-rendering: pixelated; display:block; margin:0 auto; max-width:100%; max-height:100%; }
        #ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
        #dialog {
            position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
            background:#ffffff; color:#000000; border:4px solid #000; padding:10px 16px;
            max-width:88%; font-size:15px; line-height:1.4; box-shadow:3px 3px 0 #000;
            display:none; pointer-events:all;
        }
        #battle-ui {
            position:absolute; bottom:0; left:0; width:100%; background:rgba(0,0,0,0.95);
            padding:12px; display:none; flex-direction:column; gap:8px; font-size:14px;
        }
        .health-bar { height:12px; background:#222; border:2px solid #fff; position:relative; }
        .health { height:100%; background:#00ff00; width:100%; transition:width 0.3s linear; }
    </style>
</head>
<body>
    <div id="game">
        <canvas id="canvas" width="320" height="288"></canvas>
        
        <div id="ui">
            <div id="dialog"></div>
            
            <div id="battle-ui">
                <div style="display:flex;justify-content:space-between;margin-bottom:8px;color:#fff;">
                    <div>
                        <div id="enemy-name" style="font-weight:bold;">Wild RATTA</div>
                        <div class="health-bar"><div id="enemy-health" class="health"></div></div>
                    </div>
                    <div style="text-align:right;">
                        <div id="player-name" style="font-weight:bold;">BULBA</div>
                        <div class="health-bar"><div id="player-health" class="health"></div></div>
                    </div>
                </div>
                <div id="battle-log" style="background:#111;padding:8px;height:65px;overflow-y:auto;margin-bottom:8px;"></div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                    <button onclick="useMove(0)">TACKLE</button>
                    <button onclick="useMove(1)">VINE WHIP</button>
                    <button onclick="useMove(2)">GROWL</button>
                    <button onclick="runAway()">RUN</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 320; canvas.height = 288;

        let gameState = 'overworld';
        let player = { x: 160, y: 180, dir: 2, frame: 0 }; // 0=up, 1=left, 2=down, 3=right

        const TILE = 16;
        const MAP_W = 22;
        const MAP_H = 18;

        // 0 = path (light gray), 1 = grass, 2 = building roof/wall, 3 = signpost
        let map = Array.from({length: MAP_H}, () => Array(MAP_W).fill(0));

        // Create a simple town layout like your screenshot
        for (let y = 0; y < MAP_H; y++) {
            for (let x = 0; x < MAP_W; x++) {
                if (Math.random() > 0.65) map[y][x] = 1; // grass patches
            }
        }
        // Buildings (approximating your image)
        // Top-left building
        for (let y=1; y<5; y++) for (let x=2; x<7; x++) map[y][x] = 2;
        // Top-right building
        for (let y=1; y<5; y++) for (let x=13; x<19; x++) map[y][x] = 2;
        // Bottom-right big building
        for (let y=10; y<16; y++) for (let x=10; x<21; x++) map[y][x] = 2;
        // Bottom-left small objects
        map[13][3] = 3; map[13][4] = 3; // sign + posts

        const creatures = [
            {name:"BULBA", hp:45, atk:12, moves:["TACKLE","VINE WHIP","GROWL"]},
            {name:"RATTA", hp:32, atk:13, moves:["TACKLE","QUICK ATTACK"]},
            {name:"PIKKY", hp:38, atk:15, moves:["THUNDERSHOCK","QUICK ATTACK"]}
        ];

        let playerMon = {...creatures[0], curHp:45};
        let enemyMon = null;
        let battleLog = [];

        function drawTile(sx, sy, type) {
            if (type === 0) { // path - classic light gray
                ctx.fillStyle = '#c8b8a0';
                ctx.fillRect(sx, sy, TILE, TILE);
            } else if (type === 1) { // grass
                ctx.fillStyle = '#48a048';
                ctx.fillRect(sx, sy, TILE, TILE);
                ctx.fillStyle = '#60c060';
                ctx.fillRect(sx+3, sy+3, 5, 5);
                ctx.fillRect(sx+9, sy+7, 4, 4);
            } else if (type === 2) { // building (roof + walls)
                ctx.fillStyle = '#505050'; // roof
                ctx.fillRect(sx, sy, TILE, TILE);
                ctx.fillStyle = '#a8a8a8'; // walls
                ctx.fillRect(sx, sy+6, TILE, TILE-6);
                ctx.fillStyle = '#000000';
                ctx.fillRect(sx+4, sy+9, 4, 4); // window/door detail
            } else if (type === 3) { // signpost
                ctx.fillStyle = '#c8b8a0';
                ctx.fillRect(sx, sy, TILE, TILE);
                ctx.fillStyle = '#000000';
                ctx.fillRect(sx+5, sy+4, 6, 8);
            }
        }

        function drawOverworld() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < MAP_H; y++) {
                for (let x = 0; x < MAP_W; x++) {
                    const sx = x * TILE - player.x + canvas.width / 2 - 8;
                    const sy = y * TILE - player.y + canvas.height / 2 - 16;
                    if (sx > -TILE && sx < canvas.width && sy > -TILE && sy < canvas.height) {
                        drawTile(sx, sy, map[y][x]);
                    }
                }
            }

            // Classic player sprite (red hat, blue clothes)
            const px = canvas.width / 2 - 8;
            const py = canvas.height / 2 - 16;
            ctx.fillStyle = '#ff0000'; // hat
            ctx.fillRect(px + 3, py + 2, 10, 5);
            ctx.fillStyle = '#0000a0'; // body
            ctx.fillRect(px + 4, py + 7, 8, 11);
            ctx.fillStyle = '#f0d0b0'; // face
            ctx.fillRect(px + 6, py + 5, 4, 4);
            ctx.fillStyle = '#000000'; // eyes
            ctx.fillRect(px + 7, py + 6, 1, 1);
        }

        function draw() {
            ctx.imageSmoothingEnabled = false;
            if (gameState === 'overworld') drawOverworld();
        }

        function gameLoop() {
            draw();
            requestAnimationFrame(gameLoop);
        }

        function checkEncounter() {
            if (Math.random() < 0.15) startBattle(); // higher chance in grass areas
        }

        function startBattle() {
            gameState = 'battle';
            enemyMon = {...creatures[Math.floor(Math.random() * creatures.length)]};
            enemyMon.curHp = enemyMon.hp;

            document.getElementById('battle-ui').style.display = 'flex';
            document.getElementById('enemy-name').textContent = `Wild ${enemyMon.name}`;
            document.getElementById('player-name').textContent = playerMon.name;

            updateHealth();
            addLog(`A wild ${enemyMon.name} appeared!`);
        }

        function updateHealth() {
            document.getElementById('player-health').style.width = Math.max(0, playerMon.curHp / playerMon.hp * 100) + '%';
            document.getElementById('enemy-health').style.width = Math.max(0, enemyMon.curHp / enemyMon.hp * 100) + '%';
        }

        function addLog(text) {
            battleLog.push(text);
            if (battleLog.length > 6) battleLog.shift();
            document.getElementById('battle-log').innerHTML = battleLog.join('<br>');
        }

        function useMove(idx) {
            if (!enemyMon || playerMon.curHp <= 0) return;
            const move = playerMon.moves[idx] || "TACKLE";
            const dmg = Math.floor(playerMon.atk * (0.8 + Math.random() * 0.7));
            enemyMon.curHp = Math.max(0, enemyMon.curHp - dmg);
            addLog(`BULBA used ${move}!`);
            addLog(`Dealt ${dmg} damage.`);

            updateHealth();
            if (enemyMon.curHp <= 0) {
                addLog(`Wild ${enemyMon.name} fainted!`);
                setTimeout(endBattle, 1400);
                return;
            }

            setTimeout(enemyTurn, 800);
        }

        function enemyTurn() {
            if (!enemyMon || enemyMon.curHp <= 0) return;
            const dmg = Math.floor(enemyMon.atk * (0.7 + Math.random() * 0.6));
            playerMon.curHp = Math.max(0, playerMon.curHp - dmg);
            addLog(`Wild ${enemyMon.name} attacked!`);
            addLog(`You took ${dmg} damage.`);
            updateHealth();

            if (playerMon.curHp <= 0) {
                addLog(`BULBA fainted...`);
                setTimeout(() => endBattle(true), 1500);
            }
        }

        function runAway() {
            if (Math.random() > 0.4) {
                addLog("Got away safely!");
                setTimeout(endBattle, 700);
            } else {
                addLog("Can't escape!");
                setTimeout(enemyTurn, 600);
            }
        }

        function endBattle(lost = false) {
            gameState = 'overworld';
            document.getElementById('battle-ui').style.display = 'none';
            battleLog = [];
            if (lost) {
                showDialog("You blacked out...\nBULBA was healed a little.", 2800);
                playerMon.curHp = Math.floor(playerMon.hp * 0.65);
            } else {
                showDialog("You won the battle!", 2000);
            }
        }

        function showDialog(text, ms = 3000) {
            const d = document.getElementById('dialog');
            d.textContent = text;
            d.style.display = 'block';
            setTimeout(() => d.style.display = 'none', ms);
        }

        function move(dx, dy) {
            if (gameState !== 'overworld') return;
            player.x += dx * 5;
            player.y += dy * 5;
            checkEncounter();
        }

        // Controls
        window.addEventListener('keydown', e => {
            switch(e.key) {
                case 'ArrowUp': case 'w': move(0, -1); player.dir = 0; break;
                case 'ArrowDown': case 's': move(0, 1); player.dir = 2; break;
                case 'ArrowLeft': case 'a': move(-1, 0); player.dir = 1; break;
                case 'ArrowRight': case 'd': move(1, 0); player.dir = 3; break;
            }
        });

        let startX = 0, startY = 0;
        canvas.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });
        canvas.addEventListener('touchend', e => {
            if (gameState !== 'overworld') return;
            const dx = e.changedTouches[0].clientX - startX;
            const dy = e.changedTouches[0].clientY - startY;
            if (Math.abs(dx) > 40 || Math.abs(dy) > 40) {
                if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 1 : -1, 0);
                else move(0, dy > 0 ? 1 : -1);
            }
        });

        // Auto occasional steps for demo feel
        setInterval(() => {
            if (gameState === 'overworld' && Math.random() < 0.35) {
                const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
                const d = dirs[Math.floor(Math.random()*4)];
                move(d[0], d[1]);
            }
        }, 650);

        window.onload = () => {
            showDialog("Welcome to PokéQuest!\nSwipe to walk around town.\nTall grass = wild Pokémon!", 4200);
            gameLoop();
        };
    </script>
</body>
</html>
